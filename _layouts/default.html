<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container-lg">
            <a class="navbar-brand fw-bold" href="{{ '/' | relative_url }}">
                💼 Shweta's Finance Portfolio
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ '/pages/about' | relative_url }}">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ '/pages/projects' | relative_url }}">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ '/pages/contact' | relative_url }}">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="min-vh-100">
        <div class="container-lg py-5">
            {{ content }}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-light text-center py-4 mt-5">
        <div class="container-lg">
            <p class="mb-2">&copy; 2026 Shweta. All rights reserved.</p>
            <div class="mb-2">
                {% if site.social_links %}
                    {% if site.social_links.github %}
                        <a href="https://github.com/{{ site.social_links.github }}" class="text-light me-3">GitHub</a>
                    {% endif %}
                    {% if site.social_links.linkedin %}
                        <a href="https://linkedin.com/in/{{ site.social_links.linkedin }}" class="text-light">LinkedIn</a>
                    {% endif %}
                {% endif %}
            </div>
            <p class="text-muted small">Built with Jekyll & Bootstrap</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
