title: Shweta's Finance Portfolio
author: Shweta
description: >
  Ambitious finance professional seeking opportunities in bookkeeping, accounting, and fintech.
  Combining traditional expertise with AI-powered automation to deliver innovative financial solutions.
  Ready to contribute, learn, and make an impact.

# Build settings
markdown: kramdown
theme: minima

# Site settings
url: "https://cooklab12.github.io"
baseurl: "/finance-portfolio"
repository: yourusername/finance-portfolio

# Posts/Collections
collections:
  projects:
    output: true
    permalink: /projects/:name

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "project"

# Navigation
header_pages:
  - pages/about.md
  - pages/projects.md
  - pages/contact.md

# Social links
social_links:
  github: yourusername
  linkedin: yourusername

# Other
paginate: 5
paginate_path: "/page:num/"
